{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body p-4 p-lg-5">
                <h3 class="mb-3 fw-bold">Crear cuenta</h3>
                <p class="text-muted">Registra tu negocio y empieza a gestionar tus ventas.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Usuario</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Correo</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button class="btn btn-primary w-100">Registrarse</button>
                </form>
                <div class="mt-3 text-center">
                    <a href="{% url 'login' %}" class="text-decoration-none">Ya tengo cuenta</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
