{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-4 p-lg-5">
                <h3 class="mb-3 fw-bold">Iniciar sesión</h3>
                <p class="text-muted">Accede a tu panel de ventas.</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-primary w-100 mt-3">Entrar</button>
                </form>
                <div class="mt-3 text-center">
                    <a href="{% url 'forgot_password' %}" class="text-decoration-none">¿Olvidaste tu contraseña?</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
