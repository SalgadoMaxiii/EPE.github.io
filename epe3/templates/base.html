<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Cuadros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top left, #f9fbff 0%, #eef4ff 35%, #f7f8fb 100%); color: #243244; }
        .navbar { background: linear-gradient(90deg, #0f172a 0%, #14213d 60%, #1d4ed8 100%) !important; box-shadow: 0 8px 24px rgba(0,0,0,.16); }
        .navbar-brand { letter-spacing: .04em; }
        .card { border: none; border-radius: 20px; box-shadow: 0 12px 36px rgba(15,23,42,.08); backdrop-filter: blur(8px); }
        .btn { border-radius: 999px; padding: 0.65rem 1.1rem; }
        .btn-primary { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); border: none; }
        .btn-primary:hover { background: linear-gradient(135deg, #1d4ed8 0%, #163a9f 100%); }
        .btn-outline-light:hover { background: rgba(255,255,255,.16); }
        .hero-card { background: linear-gradient(135deg, #0f172a 0%, #14213d 45%, #2563eb 100%); color: white; position: relative; overflow: hidden; }
        .hero-card::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at top right, rgba(255,255,255,.16), transparent 35%); pointer-events: none; }
        .table thead { background: #f8fafc; }
        .table td, .table th { vertical-align: middle; }
        .form-control { border-radius: 12px; border: 1px solid #dbe4f0; padding: 0.75rem 0.9rem; }
        .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 0.2rem rgba(37,99,235,.15); }
        .nav-tabs .nav-link { border-radius: 999px; color: #475569; margin-right: .4rem; }
        .nav-tabs .nav-link.active { background: #2563eb; color: white; }
        .alert { border: none; box-shadow: 0 8px 20px rgba(15,23,42,.06); }
    </style>
</head>
<body>
<script>
  window.addEventListener('beforeunload', function () {
    navigator.sendBeacon('/logout/');
  });
</script>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'home' %}">Ventas de Cuadros</a>
        <div class="ms-auto">
            {% if user.is_authenticated %}
                <a class="btn btn-outline-light btn-sm me-2" href="{% url 'dashboard' %}">Panel</a>
                <a class="btn btn-danger btn-sm" href="{% url 'logout' %}">Cerrar sesión</a>
            {% else %}
                <a class="btn btn-outline-light btn-sm me-2" href="{% url 'login' %}">Iniciar sesión</a>
                <a class="btn btn-outline-light btn-sm" href="{% url 'register' %}">Registrarse</a>
            {% endif %}
        </div>
    </div>
</nav>
<div class="container py-4">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} rounded-3">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
